services:
  - type: web
    name: healthcare-readmission-api
    runtime: python
    buildCommand: "pip install --upgrade pip && pip install numpy pandas pyarrow scikit-learn joblib faker aiofiles httpx python-multipart xgboost lightgbm shap==0.45.1 mlflow==2.13.2 fastapi==0.111.0 uvicorn[standard]==0.30.1 && python data/generate_data.py && MLFLOW_ALLOW_FILE_STORE=true python ml/train.py"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MLFLOW_ALLOW_FILE_STORE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"

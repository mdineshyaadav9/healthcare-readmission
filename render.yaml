services:
  - type: web
    name: healthcare-readmission-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: "pip install --upgrade pip && pip install numpy==1.26.4 pandas==2.2.2 pyarrow==15.0.2 scikit-learn==1.5.0 joblib==1.4.2 faker==25.8.0 aiofiles==23.2.1 httpx==0.27.0 python-multipart==0.0.9 xgboost==1.7.6 lightgbm==4.3.0 shap==0.45.1 mlflow==2.13.2 fastapi==0.111.0 'uvicorn[standard]==0.30.1' && python data/generate_data.py && MLFLOW_ALLOW_FILE_STORE=true python ml/train.py"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MLFLOW_ALLOW_FILE_STORE
        value: "true"
